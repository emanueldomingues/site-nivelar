  <!-- Nome principal -->
  <text x="20" y="70"
        font-family="Impact, Arial Black, sans-serif"
        font-size="60"
        fill="#ffffff"
        letter-spacing="1">
    NIVELAR
  </text>

  <!-- Subtexto dentro da faixa -->
  <text x="20" y="120"
        font-family="Arial Black, sans-serif"
        font-size="18"
        fill="#000000"
        letter-spacing="2">
    TERRAPLANAGEM
  </text>

</svg>